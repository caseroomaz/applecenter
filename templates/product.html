<div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-12 py-10 px-6">
    <div class="w-full md:w-1/2">
        <div class="bg-[#f5f5f7] rounded-[30px] p-10 h-[500px] flex items-center justify-center">
            <img id="mainImg" src="{{ product.images[0] }}" class="max-h-full object-contain transition-all duration-300">
        </div>
        
        <div class="flex gap-4 mt-6 justify-center">
            {% for img in product.images %}
            <div class="w-20 h-20 bg-gray-100 rounded-xl p-2 cursor-pointer border hover:border-blue-500 transition"
                 onclick="document.getElementById('mainImg').src='{{ img }}'">
                <img src="{{ img }}" class="w-full h-full object-contain">
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="w-full md:w-1/2 space-y-8">
        <div>
            <h1 class="text-5xl font-bold">{{ product.name }}</h1>
            <p class="text-3xl font-light mt-4" id="displayPrice">{{ product.price }} AZN</p>
        </div>

        {% if product.color_list %}
        <div>
            <p class="text-sm font-bold text-gray-400 uppercase mb-4">Rəng seçin</p>
            <div class="flex gap-3">
                {% for color in product.color_list %}
                <button class="w-10 h-10 rounded-full border-2 border-gray-200" 
                        style="background-color: {{ color.strip() }};"
                        onclick="this.parentElement.querySelectorAll('button').forEach(b => b.style.borderColor='#e5e7eb'); this.style.borderColor='#007aff';"></button>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <button class="w-full bg-[#007aff] text-white py-5 rounded-2xl text-xl font-bold shadow-lg">
            Sifariş et
        </button>
    </div>
</div>
