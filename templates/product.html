<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>{{product.name}}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10">

<a href="/">← Geri</a>

<div class="grid md:grid-cols-2 gap-10 mt-10">

<!-- IMAGE -->
<div>
<img id="mainImg" src="{{product.images[0]}}" class="h-96 mx-auto">

<div class="flex gap-3 mt-5">
{% for img in product.images %}
<img src="{{img}}" onclick="change(this)" class="w-20 cursor-pointer">
{% endfor %}
</div>
</div>

<!-- INFO -->
<div>
<h1 class="text-4xl font-bold">{{product.name}}</h1>
<p id="price" class="text-2xl mt-3">{{product.price}} AZN</p>

<!-- COLORS -->
<div class="mt-5">
<p>Rəng seç:</p>
<div class="flex gap-3 mt-2">
{% for c in product.color_list %}
<div onclick="select(this)" style="background:{{c}}"
class="w-8 h-8 rounded-full border cursor-pointer"></div>
{% endfor %}
</div>
</div>

<!-- STORAGE -->
<div class="mt-5">
<p>Yaddaş:</p>
<div class="flex gap-3 mt-2">
{% for s in product.storage_list %}
<div onclick="priceUpdate({{loop.index0}})" 
class="border p-2 cursor-pointer">
{{s}}
</div>
{% endfor %}
</div>
</div>

<button class="bg-blue-600 text-white p-3 mt-6 rounded-xl w-full">
Səbətə əlavə et
</button>

</div>

</div>

<script>
let base = parseInt("{{product.price}}")

function change(el){
document.getElementById("mainImg").src = el.src
}

function select(el){
document.querySelectorAll("div[onclick='select(this)']")
.forEach(i=>i.style.border="")
el.style.border="2px solid blue"
}

function priceUpdate(i){
document.getElementById("price").innerText = (base + i*200) + " AZN"
}
</script>

</body>
</html>
