<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>{{product.name}}</title>
</head>

<body class="bg-gray-100 p-10">

<a href="/" class="text-blue-500">← Geri</a>

<div class="bg-white p-10 rounded-3xl max-w-4xl mx-auto mt-6">

<img src="{{product.image}}" class="h-80 mx-auto object-contain">

<h1 class="text-3xl font-bold mt-6 text-center">{{product.name}}</h1>

<p class="text-center text-gray-500 mt-2">
Qiymət: <span id="price">{{product.price}}</span> AZN
</p>

<!-- STORAGE -->
<div class="mt-6 text-center">
<select id="storage" onchange="changePrice()" class="border p-2 rounded">
<option value="0">128GB</option>
<option value="200">256GB (+200 AZN)</option>
<option value="400">512GB (+400 AZN)</option>
</select>
</div>

<button class="bg-blue-600 text-white px-6 py-3 rounded mt-6 block mx-auto">
Sifariş et
</button>

</div>

<script>
let base = parseInt("{{product.price}}") || 0;

function changePrice(){
let extra = parseInt(document.getElementById("storage").value) || 0;
document.getElementById("price").innerText = base + extra;
}
</script>

</body>
</html>
