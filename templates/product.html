<div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-16 py-10">
    <div class="w-full md:w-1/2 space-y-6">
        <div class="bg-[#f5f5f7] rounded-[30px] p-10 h-[550px] flex items-center justify-center relative">
            <img id="main-display" src="{{product.images[0]}}" class="max-h-full object-contain transition-all duration-500">
        </div>
        <div class="flex justify-center gap-3">
            {% for img in product.images %}
            <img src="{{img.strip()}}" onclick="document.getElementById('main-display').src=this.src" 
                 class="w-16 h-16 p-2 bg-white rounded-xl cursor-pointer border hover:border-blue-500 transition">
            {% endfor %}
        </div>
    </div>

    <div class="w-full md:w-1/2 space-y-10">
        <header>
            <h1 class="text-5xl font-bold tracking-tight">{{product.name}}</h1>
            <p class="text-2xl text-gray-500 mt-2" id="price-display">{{product.price}} AZN</p>
        </header>

        <div>
            <p class="text-sm font-bold mb-4">Rəng seçin</p>
            <div class="flex gap-4">
                {% for color in product.color_list %}
                <button onclick="selectColor(this)" class="w-10 h-10 rounded-full border-2 border-gray-200 ring-offset-2 hover:ring-2 ring-blue-400"
                        style="background-color: {{color.strip()}};"></button>
                {% endfor %}
            </div>
        </div>

        <div>
            <p class="text-sm font-bold mb-4">Yaddaş seçin</p>
            <div class="grid grid-cols-2 gap-4">
                {% for storage in product.storage_list %}
                <div onclick="updateFinalPrice(this, {{loop.index0}})" 
                     class="storage-option border-2 border-gray-100 rounded-2xl p-5 cursor-pointer hover:border-blue-300 transition">
                    <p class="font-bold text-lg">{{storage.strip()}}</p>
                    <p class="text-xs text-gray-400">+{{loop.index0 * 200}} AZN</p>
                </div>
                {% endfor %}
            </div>
        </div>

        <button class="w-full bg-[#007aff] text-white py-5 rounded-2xl text-xl font-bold hover:bg-blue-600 transition shadow-lg">
            Sifariş et
        </button>
    </div>
</div>

<script>
    function selectColor(el) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('ring-2'));
        el.classList.add('ring-2');
    }
    function updateFinalPrice(el, idx) {
        document.querySelectorAll('.storage-option').forEach(o => o.classList.remove('border-blue-500', 'bg-blue-50'));
        el.classList.add('border-blue-500', 'bg-blue-50');
        let base = parseInt("{{product.price}}");
        document.getElementById('price-display').innerText = (base + (idx * 200)) + " AZN";
    }
</script>
