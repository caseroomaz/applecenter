<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>{{product.name}}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10">

<a href="/">← Geri</a>

<div class="grid md:grid-cols-2 gap-10 mt-10">

<!-- IMAGE -->
<div>
<img id="mainImg" src="{{product.image}}" class="h-96 mx-auto">
</div>

<!-- INFO -->
<div>
<h1 class="text-4xl font-bold">{{product.name}}</h1>
<p id="price" class="text-2xl mt-3">{{product.price}} AZN</p>

<!-- COLORS -->
<div class="mt-6">
<p class="text-sm text-gray-500">Rəng seç</p>
<div class="flex gap-3 mt-3">
{% for c in product.colors %}
<div onclick="selectColor(this)"
style="background:{{c}}"
class="w-10 h-10 rounded-full border cursor-pointer"></div>
{% endfor %}
</div>
</div>

<!-- STORAGE -->
<div class="mt-6">
<p class="text-sm text-gray-500">Yaddaş</p>
<div class="flex gap-3 mt-3">
{% for s in product.storage_list %}
<div onclick="priceUpdate({{loop.index0}})"
class="border p-3 rounded-lg cursor-pointer">{{s}}</div>
{% endfor %}
</div>
</div>

<button class="bg-blue-600 text-white p-3 mt-8 rounded-xl w-full">
<a href="/cart/add/{{product.id}}">Səbətə əlavə et</a>
</button>

</div>
</div>

<script>
let base = parseInt("{{product.price}}")

function selectColor(el){
document.querySelectorAll("div[onclick='selectColor(this)']").forEach(i=>i.style.border="")
el.style.border="2px solid blue"
}

function priceUpdate(i){
document.getElementById("price").innerText = (base + i*200) + " AZN"
}
</script>

</body>
</html>
