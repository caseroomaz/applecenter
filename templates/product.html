<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white p-6 md:p-16">

<a href="/" class="text-blue-500">← Geri</a>

<div class="grid md:grid-cols-2 gap-12 mt-10">

<div>
<img id="mainImg" src="{{product.image}}" class="h-96 mx-auto transition hover:scale-105">
</div>

<div>
<h1 class="text-4xl font-bold">{{product.name}}</h1>
<p id="price" class="text-2xl mt-3">{{product.price}} AZN</p>

<div class="mt-6">
<p class="text-gray-500">Rəng</p>
<div class="flex gap-3 mt-2">
{% for c in product.colors %}
<div onclick="selectColor(this)" style="background:{{c}}" class="w-10 h-10 rounded-full border cursor-pointer"></div>
{% endfor %}
</div>
</div>

<div class="mt-6">
<p class="text-gray-500">Yaddaş</p>
<div class="flex gap-3 mt-2">
{% for s in product.storage_list %}
<div onclick="priceUpdate({{loop.index0}})" class="border p-3 rounded-lg cursor-pointer">{{s}}</div>
{% endfor %}
</div>
</div>

<a href="/cart/add/{{product.id}}" 
class="block bg-blue-600 text-white p-4 mt-8 rounded-xl text-center">
Səbətə əlavə et
</a>

</div>
</div>

<script>
let base = parseInt("{{product.price}}")

function selectColor(el){
document.querySelectorAll(".color").forEach(i=>i.style.border="")
el.style.border="2px solid blue"
}

function priceUpdate(i){
document.getElementById("price").innerText = (base + i*200) + " AZN"
}
</script>

</body>
</html>
