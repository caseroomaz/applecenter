<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#f5f5f7; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #splash {
            position:fixed; inset:0; background:#000;
            display:flex; align-items:center; justify-content:center;
            z-index:9999; animation:fadeOut 1s forwards 2s;
        }
        #splash img { width:100px; filter: invert(1); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes fadeOut { to { opacity:0; visibility:hidden; } }
        .product-card { transition: 0.4s; border-radius: 20px; border: 1px solid transparent; }
        .product-card:hover { transform: scale(1.02); background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="splash">
    <img src="{{ url_for('static', filename='logo.png') }}">
</div>

<nav class="bg-black/90 backdrop-blur-md sticky top-0 z-50 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='logo.png') }}" class="w-6 invert">
            <span class="font-bold tracking-tight">AppleCenter</span>
        </div>
        <div class="space-x-8 text-sm opacity-80 hidden md:block">
            <a href="#" class="hover:opacity-100">iPhone</a>
            <a href="#" class="hover:opacity-100">iPad</a>
            <a href="#" class="hover:opacity-100">AirPods</a>
            <a href="#" class="hover:opacity-100">Mac</a>
        </div>
    </div>
</nav>

<header class="text-center py-24 bg-white">
    <h1 class="text-6xl font-bold tracking-tighter">AppleCenter.</h1>
    <p class="text-gray-500 mt-4 text-xl font-light">Eleqantlıq və texnologiyanın mərkəzi.</p>
</header>

<div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-8 p-10">
    {% for p in products %}
    <a href="/product/{{p.id}}" class="product-card p-8 flex flex-col items-center">
        <img src="{{p.image}}" class="h-64 object-contain" onerror="this.src='https://apple.com/v/airpods/shared/airpods-4/images/overview/hero/hero_static__f7h0f2b3j8m6_large.jpg'">
        <h2 class="text-2xl font-semibold mt-6">{{p.name}}</h2>
        <p class="text-gray-500 mt-2">{{p.price}} AZN-dən başlayaraq</p>
    </a>
    {% endfor %}
</div>

<footer class="text-center p-10 opacity-30">
    <a href="/admin" class="text-xs">Admin Girişi</a>
</footer>

</body>
</html>
