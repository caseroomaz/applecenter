<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseRoom | Apple Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --apple-black: #1d1d1f; --apple-white: #f5f5f7; --apple-blue: #0071e3; }
        body { margin:0; font-family: 'SF Pro Display', sans-serif; background: var(--apple-white); overflow-x: hidden; }
        
        /* Navbar */
        nav { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px; position: fixed; width: 100%; top:0; z-index: 1000; display: flex; justify-content: center; gap: 30px; }
        nav a { color: #f5f5f7; text-decoration: none; font-size: 14px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; }

        /* Hero Section */
        .hero { height: 100 py; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: #fff; padding-top: 100px; }
        .hero h1 { font-size: 56px; font-weight: 600; margin-bottom: 0; }
        .hero p { font-size: 24px; color: #86868b; }

        /* Product Grid */
        .container { max-width: 1200px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; transition: transform 0.5s ease; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 200px; height: auto; transition: 0.5s; }
        .card h2 { font-size: 28px; margin: 15px 0; }
        .price { font-size: 20px; color: var(--apple-black); font-weight: 500; }
        
        /* Buttons */
        .btn-buy { background: var(--apple-blue); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; margin-top: 15px; }

        /* Floating Chatbot */
        #chat-icon { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/"><i class="fab fa-apple" style="font-size: 20px;"></i></a>
    <a href="#">Store</a>
    <a href="#">iPhone</a>
    <a href="#">Səbət <i class="fa fa-shopping-cart"></i></a>
    <a href="/login">Admin</a>
</nav>

<section class="hero">
    <h1 id="hero-title">iPhone 16 Pro</h1>
    <p id="hero-sub">Apple-ın ən güclüsü.</p>
    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <a href="#" style="color: var(--apple-blue); text-decoration: none;">Daha çox öyrən ></a>
        <a href="#" style="color: var(--apple-blue); text-decoration: none;">Al ></a>
    </div>
</section>

<div class="container">
    {% for p in products %}
    <div class="card">
        <img src="{{ p.image }}" alt="">
        <h2>{{ p.name }}</h2>
        <p class="price">{{ p.price }} AZN</p>
        <button class="btn-buy">Səbətə at</button>
    </div>
    {% endfor %}
</div>

<div id="chat-icon"><i class="fa fa-comment"></i></div>

<script>
    // GSAP Animasiyaları
    gsap.from("#hero-title", { opacity: 0, y: 50, duration: 1, delay: 0.5 });
    gsap.from("#hero-sub", { opacity: 0, y: 30, duration: 1, delay: 0.8 });
    gsap.from(".card", { opacity: 0, scale: 0.9, duration: 1, stagger: 0.2, scrollTrigger: ".card" });

    // Chatbot funksiyası
    document.getElementById('chat-icon').onclick = function() {
        let msg = prompt("Sizə necə kömək edə bilərəm?");
        if(msg) {
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            }).then(res => res.json()).then(data => alert("AI: " + data.response));
        }
    };
</script>

</body>
</html>
