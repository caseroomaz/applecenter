<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppleCenter</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f5f5f7; font-family:-apple-system; }

/* Splash */
#splash {
position:fixed; inset:0; background:#000;
display:flex; align-items:center; justify-content:center;
flex-direction:column; z-index:999;
animation:fadeOut 2.5s forwards;
}
#splash img { width:120px; animation:zoom 1s ease; }

@keyframes zoom { from{transform:scale(.5);opacity:0} to{transform:scale(1)} }
@keyframes fadeOut { 80%{opacity:1} 100%{opacity:0;visibility:hidden} }

/* Card */
.card { transition:.4s; border-radius:20px; }
.card:hover { transform:scale(1.05); box-shadow:0 20px 40px rgba(0,0,0,.1); }
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="{{ url_for('static', filename='logo.png') }}">
<h1 class="text-white text-2xl mt-4">AppleCenter</h1>
</div>

<!-- NAVBAR -->
<nav class="bg-black text-white p-4 flex justify-between items-center">
<div class="flex items-center space-x-2">
<img src="{{ url_for('static', filename='logo.png') }}" class="w-8">
<span class="font-bold">AppleCenter</span>
</div>

<div class="space-x-6 hidden md:block">
<a href="#">iPhone</a>
<a href="#">iPad</a>
<a href="#">AirPods</a>
<a href="#">Mac</a>
<a href="#">Watch</a>
<a href="#">Aksesuar</a>
</div>
</nav>

<!-- HEADER -->
<header class="text-center py-20">
<h1 class="text-6xl font-bold">Apple Center</h1>
<p class="text-gray-500 mt-3">Premium texnologiya mağazası</p>
</header>

<!-- PRODUCTS -->
<div class="grid md:grid-cols-3 gap-8 p-10">
{% for p in products %}
<a href="/product/{{p.id}}">
<div class="card bg-white p-6 text-center">
<img src="{{p.image}}" class="h-60 mx-auto object-contain">
<h2 class="text-xl mt-4">{{p.name}}</h2>
<p class="text-gray-500">{{p.price}} AZN</p>
</div>
</a>
{% endfor %}
</div>

<!-- FOOTER -->
<footer class="text-center text-gray-400 p-10">
<a href="/admin" class="text-xs opacity-50">Admin</a>
</footer>

</body>
</html>
