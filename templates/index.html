<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleCenter | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .nav-blur { background: rgba(0,0,0,0.8); backdrop-filter: saturate(180%) blur(20px); }
        .apple-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 22px; }
        .apple-card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .buy-btn { background: #0071e3; color: white; border-radius: 20px; padding: 8px 16px; transition: 0.3s; }
        .buy-btn:hover { background: #0077ed; }
        #chat-bot { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
    </style>
</head>
<body>

    <nav class="nav-blur sticky top-0 z-50 p-4 text-white">
        <div class="container mx-auto flex justify-between items-center px-6">
            <a href="/" class="text-2xl font-bold tracking-tighter">AppleCenter</a>
            <div class="space-x-6 text-sm opacity-80 hidden md:flex">
                <a href="#">iPhone</a><a href="#">iPad</a><a href="#">Watch</a><a href="/admin">Admin</a>
            </div>
            <div>🛒</div>
        </div>
    </nav>

    <header class="text-center py-24 animate__animated animate__fadeInDown">
        <h1 class="text-7xl font-bold tracking-tight text-black">iPhone 16 Pro</h1>
        <p class="text-2xl mt-4 text-gray-500 font-light">İnanılmaz güc. Möhtəşəm dizayn.</p>
    </header>

    <main class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-10">
        {% for p in products %}
        <div class="apple-card bg-white p-8 flex flex-col items-center animate__animated animate__fadeInUp">
            <img src="{{ p.image }}" class="h-64 object-contain mb-6">
            <h2 class="text-2xl font-semibold">{{ p.name }}</h2>
            <p class="text-lg text-gray-500 mt-2">{{ p.price }} AZN</p>
            
            <button onclick="openModal('{{p.name}}')" class="buy-btn mt-6 w-full font-medium">Sifariş et</button>
        </div>
        {% endfor %}
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl w-96">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
            <form action="/order" method="POST" class="space-y-4">
                <input type="hidden" name="p_name" id="p_name_input">
                <input type="text" name="c_name" placeholder="Adınız" class="w-full border p-3 rounded-xl" required>
                <input type="text" name="phone" placeholder="Telefon nömrəniz" class="w-full border p-3 rounded-xl" required>
                <div class="flex space-x-2">
                    <button type="button" onclick="closeModal()" class="w-1/2 bg-gray-200 p-3 rounded-xl">Ləğv et</button>
                    <button type="submit" class="w-1/2 buy-btn p-3 rounded-xl">Təsdiqlə</button>
                </div>
            </form>
        </div>
    </div>

    <div id="chat-bot">
        <button onclick="alert('Salam! AppleCenter AI köməkçisi tezliklə aktiv olacaq.')" class="bg-black text-white p-4 rounded-full shadow-2xl">💬 AI Chat</button>
    </div>

    <script>
        function openModal(name) {
            document.getElementById('orderModal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('p_name_input').value = name;
        }
        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }
    </script>
</body>
</html>
