<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseRoom | Apple Premium Store</title>
    <style>
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f7; }
        nav { background: rgba(0,0,0,0.8); padding: 15px; text-align: center; position: fixed; width: 100%; top:0; z-index: 100;}
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 14px; }
        .hero { background: white; padding: 100px 20px; text-align: center; margin-top: 50px; }
        .hero h1 { font-size: 48px; margin: 0; }
        .container { max-width: 1000px; margin: 30px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 100%; border-radius: 10px; }
        .btn { background: #0071e3; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Ana Səhifə</a>
        <a href="#">iPhone</a>
        <a href="#">Səbət</a>
    </nav>
    <div class="hero">
        <h1>iPhone 16 Pro</h1>
        <p>Gözləntilərin fövqündə.</p>
    </div>
    <div class="container">
        {% for p in products %}
        <div class="card">
            <img src="{{ p.image }}" alt="">
            <h3>{{ p.name }}</h3>
            <p>{{ p.price }} AZN</p>
            <button class="btn">Sifariş Et</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
