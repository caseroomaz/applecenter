<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#f5f5f7; font-family:-apple-system, system-ui, sans-serif; overflow-x:hidden; }
        
        /* Giriş Animasiyası */
        #splash {
            position:fixed; inset:0; background:#000; display:flex; 
            align-items:center; justify-content:center; z-index:9999;
            animation: fadeOut 1s forwards 2.5s;
        }
        #splash img { width:80px; filter:invert(1); animation: appleIn 1.5s ease-out; }
        @keyframes appleIn { from { transform:scale(0.5); opacity:0; } to { transform:scale(1.2); opacity:1; } }
        @keyframes fadeOut { to { opacity:0; visibility:hidden; } }

        .nav-link { opacity: 0.7; transition: 0.3s; font-size: 14px; }
        .nav-link:hover { opacity: 1; }
        .product-card { transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px; }
        .product-card:hover { transform: translateY(-8px); background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

<div id="splash">
    <img src="{{ url_for('static', filename='logo.png') }}">
</div>

<nav class="bg-black/90 backdrop-blur-md sticky top-0 z-50 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <a href="/" class="flex items-center space-x-3">
            <img src="{{ url_for('static', filename='logo.png') }}" class="w-6 invert">
            <span class="font-bold text-lg tracking-tight">AppleCenter</span>
        </a>

        <div class="hidden md:flex space-x-8">
            {% for cat in categories %}
            <a href="/?cat={{cat}}" class="nav-link">{{cat}}</a>
            {% endfor %}
        </div>

        <div class="w-6"></div> </div>
</nav>

<header class="py-20 text-center bg-white">
    <h1 class="text-6xl font-bold tracking-tighter">AppleCenter.</h1>
    <p class="text-gray-500 mt-4 text-xl">Arzuladığınız texnologiya burada.</p>
</header>

<div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 p-10">
    {% for p in products %}
    <a href="/product/{{p.id}}" class="product-card p-10 flex flex-col items-center">
        <div class="h-64 flex items-center">
            <img src="{{p.image}}" class="max-h-full object-contain" onerror="this.src='https://via.placeholder.com/300?text=AppleCenter'">
        </div>
        <h2 class="text-2xl font-bold mt-8">{{p.name}}</h2>
        <p class="text-gray-500 mt-2">{{p.price}} AZN-dən</p>
    </a>
    {% endfor %}
</div>

</body>
</html>
