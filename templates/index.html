<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseRoom | Apple Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #fbfbfd; font-family: -apple-system, sans-serif; }
        .apple-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); }
        .product-card { transition: transform 0.4s ease, box-shadow 0.4s ease; border-radius: 20px; background: white; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .btn-buy { background: #0071e3; border-radius: 20px; transition: 0.3s; }
        .btn-buy:hover { background: #0077ed; }
        .logo-text { font-weight: 600; letter-spacing: -1px; color: white; }
    </style>
</head>
<body>

    <nav class="apple-nav sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="logo-text text-2xl">CaseRoom</div>
            <div class="hidden md:flex space-x-8 text-white text-sm opacity-80">
                <a href="#" class="hover:opacity-100">Store</a>
                <a href="#" class="hover:opacity-100">Mac</a>
                <a href="#" class="hover:opacity-100">iPhone</a>
                <a href="#" class="hover:opacity-100">Support</a>
            </div>
            <div class="text-white">🔍 🛒</div>
        </div>
    </nav>

    <section class="text-center py-20 animate__animated animate__fadeIn">
        <h1 class="text-6xl font-bold mb-4">iPhone 16 Pro</h1>
        <p class="text-2xl opacity-70">Gözəllik və gücün harmoniyası.</p>
        <div class="mt-6 flex justify-center space-x-4">
            <a href="#" class="text-blue-600 hover:underline text-lg">Daha çox öyrən ></a>
            <a href="#" class="text-blue-600 hover:underline text-lg">Al ></a>
        </div>
    </section>

    <div class="container mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 p-6">
        {% for p in products %}
        <div class="product-card p-6 text-center">
            <img src="{{ p.image }}" class="w-full h-64 object-contain mb-4">
            <h3 class="text-2xl font-bold">{{ p.name }}</h3>
            <p class="text-xl my-2 text-gray-600">{{ p.price }} AZN-dən</p>
            
            <form action="/order" method="POST" class="mt-4 space-y-2">
                <input type="hidden" name="product_name" value="{{ p.name }}">
                <input type="text" name="customer_name" placeholder="Adınız" class="border p-2 w-full rounded-lg" required>
                <input type="text" name="phone" placeholder="Telefon" class="border p-2 w-full rounded-lg" required>
                <button type="submit" class="btn-buy text-white px-6 py-2 w-full">Sifariş Ver</button>
            </form>
            
            <a href="/admin/delete/{{ p.id }}" class="text-red-500 text-xs mt-4 block">❌ Məhsulu Sil</a>
        </div>
        {% endfor %}
    </div>

    <footer class="bg-gray-100 py-10 mt-20 text-center text-gray-500 text-sm">
        <p>&copy; 2026 CaseRoom Azerbaijan. Bütün hüquqlar qorunur.</p>
    </footer>

</body>
</html>
