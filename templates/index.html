<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleCenter - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');
        body { background:#fbfbfd; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #splash {
            position:fixed; inset:0; background:#000;
            display:flex; align-items:center; justify-content:center;
            z-index:9999; animation: fadeOut 1.5s forwards 2s;
        }
        #splash img { width:80px; filter: invert(1); animation: pulse 1.5s infinite ease-in-out; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .product-card { transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 24px; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.12); }
    </style>
</head>
<body>

<div id="splash">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
</div>

<nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <a href="/" class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='logo.png') }}" class="w-6 invert">
            <span class="font-medium tracking-tight">AppleCenter</span>
        </a>
        <div class="hidden md:flex space-x-8 text-sm font-light opacity-80">
            <a href="#" class="hover:opacity-100">iPhone</a>
            <a href="#" class="hover:opacity-100">Mac</a>
            <a href="#" class="hover:opacity-100">AirPods</a>
            <a href="#" class="hover:opacity-100">Watch</a>
        </div>
    </div>
</nav>

<section class="text-center py-24 px-6">
    <h1 class="text-5xl md:text-7xl font-bold tracking-tight">Apple Center.</h1>
    <p class="text-xl md:text-2xl text-gray-500 mt-5 font-light">Sevdiyiniz texnologiyalar indi daha yaxın.</p>
</section>

<div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10 p-10">
    {% for p in products %}
    <a href="/product/{{p.id}}" class="product-card bg-white overflow-hidden p-8 flex flex-col items-center">
        <div class="h-64 flex items-center justify-center">
            <img src="{{p.image}}" class="max-h-full object-contain" onerror="this.src='https://via.placeholder.com/300?text=Image+Not+Found'">
        </div>
        <div class="mt-8 text-center">
            <h2 class="text-2xl font-semibold">{{p.name}}</h2>
            <p class="text-gray-500 mt-2">Başlayan qiymət: {{p.price}} AZN</p>
            <span class="text-blue-600 mt-4 inline-block font-medium">Daha ətraflı ></span>
        </div>
    </a>
    {% endfor %}
</div>

</body>
</html>
