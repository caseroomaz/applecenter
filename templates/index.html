<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Center | Premium Mağaza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #fbfbfd; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .nav-blur { background: rgba(0,0,0,0.8); backdrop-filter: saturate(180%) blur(20px); }
        .apple-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 22px; cursor: pointer; background: white; }
        .apple-card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; items: center; justify-content: center;
            animation: fadeOut 2.5s forwards;
        }
        .splash-img {
            width: 150px; height: 150px; border-radius: 50%;
            animation: zoomIn 1.2s ease-out;
        }

        @keyframes fadeOut { 0%, 80% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes zoomIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://i.ibb.co/3mS00dZ/image-3bdee7.png" class="splash-img" alt="Logo">
        <div class="mt-4 text-white text-xl font-light tracking-widest animate__animated animate__fadeInUp">APPLE CENTER</div>
    </div>

    <nav class="nav-blur sticky top-0 z-50 p-4 text-white">
        <div class="container mx-auto flex justify-between items-center px-6">
            <a href="/" class="flex items-center space-x-3">
                <img src="https://i.ibb.co/3mS00dZ/image-3bdee7.png" class="w-8 h-8 rounded-full" alt="Logo">
                <span class="font-bold text-lg tracking-tight">Apple Center</span>
            </a>
            <div class="space-x-8 text-sm font-light hidden md:flex">
                <a href="#" class="hover:text-gray-400">iPhone</a>
                <a href="#" class="hover:text-gray-400">AirPods</a>
                <a href="#" class="hover:text-gray-400">Aksesuarlar</a>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/admin" class="text-xs opacity-50 hover:opacity-100 transition">Admin</a>
                <span class="cursor-pointer text-xl">🛒</span>
            </div>
        </div>
    </nav>

    <header class="text-center py-20 animate__animated animate__fadeIn">
        <h1 class="text-6xl font-bold text-black mb-4">iPhone 17 Pro</h1>
        <p class="text-2xl text-gray-500 font-light">Titan gücü. Süni zəka zərifliyi.</p>
        <div class="mt-8 space-x-4">
            <button class="bg-blue-600 text-white px-8 py-3 rounded-full hover:bg-blue-700 transition">İndi al</button>
            <a href="#" class="text-blue-600 hover:underline">Daha çox öyrən ></a>
        </div>
    </header>

    <main class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
        {% for p in products %}
        <div class="apple-card p-10 flex flex-col items-center">
            <div class="h-64 flex items-center justify-center mb-8">
                <img src="{{ p.image }}" class="max-h-full object-contain" alt="{{ p.name }}">
            </div>
            <h2 class="text-2xl font-semibold text-gray-900">{{ p.name }}</h2>
            <p class="text-lg text-gray-500 mt-2">{{ p.price }} AZN</p>
            <button onclick="openOrder('{{p.name}}', '{{p.price}}')" class="mt-6 bg-gray-900 text-white px-6 py-2 rounded-full hover:bg-black transition">Sifariş</button>
        </div>
        {% endfor %}
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-[32px] w-full max-w-md shadow-2xl">
            <h2 id="modalTitle" class="text-3xl font-bold mb-2"></h2>
            <p id="modalPrice" class="text-xl text-gray-500 mb-8"></p>
            <form action="/order" method="POST" class="space-y-4">
                <input type="hidden" name="p_name" id="p_name_input">
                <input type="text" name="c_name" placeholder="Ad və Soyad" class="w-full bg-gray-100 border-none p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                <input type="text" name="phone" placeholder="Əlaqə nömrəsi" class="w-full bg-gray-100 border-none p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeOrder()" class="flex-1 py-4 bg-gray-200 rounded-2xl font-bold">Ləğv et</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200">Təsdiqlə</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openOrder(name, price) {
            document.getElementById('orderModal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = price + ' AZN';
            document.getElementById('p_name_input').value = name;
        }
        function closeOrder() {
            document.getElementById('orderModal').classList.add('hidden');
        }
    </script>
</body>
</html>
