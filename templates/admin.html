<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>AppleCenter Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10 font-sans">
    <div class="container mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold text-black tracking-tight">Admin Dashboard</h1>
            <a href="/" class="bg-gray-200 p-3 rounded-lg text-gray-700 font-medium">Ana Səhifə</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <h2 class="text-2xl font-bold mb-6">Yeni Məhsul Əlavə Et</h2>
                <form action="/admin/add" method="POST" class="space-y-4">
                    <input type="text" name="name" placeholder="Model adı (məs: iPhone 17 Pro, AirPods Max)" class="w-full border p-3 rounded-xl" required>
                    <input type="text" name="price" placeholder="Qiymət (məs: 2499)" class="w-full border p-3 rounded-xl" required>
                    <input type="text" name="image" placeholder="Şəkil Linki (URL) - Arxa fonu ağ olmalıdır!" class="w-full border p-3 rounded-xl" required>
                    <button class="bg-green-600 text-white p-3 rounded-xl w-full font-medium">Əlavə et</button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <h2 class="text-2xl font-bold mb-6">Son Sifarişlər</h2>
                <div class="space-y-3 h-80 overflow-y-auto pr-3">
                    {% for o in orders %}
                    <div class="border-b p-3 bg-gray-50 rounded-lg">
                        <div class="font-bold text-black">{{ o.c_name }}</div>
                        <div class="text-gray-600">{{ o.p_name }}</div>
                        <div class="text-gray-500">{{ o.phone }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-bold mt-12 mb-6">Məhsulları İdarə Et</h2>
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <div class="space-y-3 h-96 overflow-y-auto pr-3">
                {% for p in products %}
                <div class="flex justify-between items-center border-b py-3 bg-gray-50 rounded-lg p-4">
                    <span class="font-medium text-black">{{ p.name }} - {{ p.price }} AZN</span>
                    <a href="/admin/delete/{{ p.id }}" class="text-red-600 font-bold bg-red-100 px-4 py-1 rounded-full">Sil</a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
