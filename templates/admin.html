<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>Admin</title>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-6">Admin Panel</h1>

<form action="/admin/add" method="POST" class="space-y-3 mb-10">
<input name="name" placeholder="Ad" class="w-full p-3 border rounded" required>
<input name="price" placeholder="Qiymət" class="w-full p-3 border rounded" required>
<input name="image" placeholder="Şəkil URL" class="w-full p-3 border rounded" required>
<button class="bg-green-600 text-white p-3 w-full rounded">Əlavə et</button>
</form>

{% for p in products %}
<div class="flex justify-between border-b py-2">
<span>{{p.name}} - {{p.price}}</span>
<a href="/admin/delete/{{p.id}}" class="text-red-500">Sil</a>
</div>
{% endfor %}

</body>
</html>
