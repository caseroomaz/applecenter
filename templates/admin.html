<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<a href="/" class="text-blue-500">← Geri</a>

<div class="bg-white p-10 rounded-2xl mt-6 max-w-4xl mx-auto">

<img src="{{product.image}}" class="h-80 mx-auto">

<h1 class="text-3xl font-bold mt-6">{{product.name}}</h1>

<p class="text-gray-500 mt-2">Qiymət: <span id="price">{{product.price}}</span> AZN</p>

<!-- COLOR -->
<div class="mt-6">
<h3 class="font-semibold">Rəng seç:</h3>
<select id="color" class="border p-2 rounded mt-2">
<option>Black</option>
<option>Silver</option>
<option>Gold</option>
</select>
</div>

<!-- STORAGE -->
<div class="mt-6">
<h3 class="font-semibold">Yaddaş seç:</h3>
<select id="storage" onchange="changePrice()" class="border p-2 rounded mt-2">
<option value="0">128GB</option>
<option value="200">256GB (+200 AZN)</option>
<option value="400">512GB (+400 AZN)</option>
</select>
</div>

<button class="bg-blue-600 text-white px-6 py-3 rounded mt-6">Sifariş et</button>

</div>

<script>
let base = {{product.price}};

function changePrice(){
let extra = document.getElementById("storage").value;
document.getElementById("price").innerText = parseInt(base) + parseInt(extra);
}
</script>

</body>
</html>
