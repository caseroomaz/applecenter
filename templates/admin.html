<form action="/admin/add" method="POST" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
    <input name="name" placeholder="Məhsulun adı (məs: iPhone 17)" class="w-full p-3 border rounded" required>
    <select name="category" class="w-full p-3 border rounded">
        <option value="iphone">iPhone</option>
        <option value="mac">MacBook</option>
        <option value="airpods">AirPods</option>
    </select>
    <input name="price" type="number" placeholder="Qiymət (AZN)" class="w-full p-3 border rounded" required>
    <input name="image" placeholder="Şəkil URL" class="w-full p-3 border rounded" required>
    <input name="colors" placeholder="Rənglər (məs: #000,#fff,#gold)" class="w-full p-3 border rounded">
    <input name="storages" placeholder="Yaddaşlar (məs: 128GB,256GB,512GB)" class="w-full p-3 border rounded">
    <textarea name="description" placeholder="Açıqlama" class="w-full p-3 border rounded"></textarea>
    <button class="bg-black text-white p-4 w-full rounded-xl font-bold">Məhsulu Əlavə Et</button>
</form>
